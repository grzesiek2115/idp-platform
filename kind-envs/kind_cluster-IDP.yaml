# https://kind.sigs.k8s.io/docs/user/ingress/

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: idp-k8s-cluster
nodes:
- role: control-plane
  image: kindest/node:v1.35.0
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 8080
    protocol: TCP
  - containerPort: 443
    hostPort: 8443
    protocol: TCP
- role: worker
  image: kindest/node:v1.35.0

# kind create cluster --config ./kind_cluster-IDP.yaml
# kind delete cluster --name idp-k8s-cluster
